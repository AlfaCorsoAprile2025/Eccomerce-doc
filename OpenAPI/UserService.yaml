openapi: 3.0.3
info:
  title: E-commerce User Service API
  description: API per la gestione dell'anagrafica utente, indirizzi e contatti di spedizione.
  version: 1.0.0

tags:
  - name: Profilo Utente
    description: Gestione dati anagrafici e profilo.
  - name: Spedizioni e Contatti
    description: Gestione indirizzi e numeri di telefono per le consegne.

servers:
  - url: http://localhost:8084/user
    description: User Service Local Server

security:
  - Auth: []

paths:
  # --- PROFILO UTENTE ---
  /me:
    get:
      tags:
        - Profilo Utente
      summary: Recupera il profilo dell'utente autenticato
      responses:
        '200':
          description: Profilo recuperato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /users:
    get:
      tags:
        - Profilo Utente
      summary: (Admin) Lista tutti gli utenti
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Elenco utenti paginato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Profilo Utente
      summary: (Admin) Crea un nuovo utente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Utente creato
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    put:
      tags:
        - Profilo Utente
      summary: (Admin) Aggiornamento totale utente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '200':
          description: Utente aggiornato
        '400':
          $ref: '#/components/responses/BadRequest'          
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - Profilo Utente
      summary: Aggiornamento parziale utente
      description: Modifica solo i campi inviati nel body. Utile per aggiornamenti rapidi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Utente aggiornato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'    
    delete:
      tags:
        - Profilo Utente
      summary: (Admin) Elimina utente
      responses:
        '204':
          description: Utente rimosso
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Profilo Utente
      summary: (Admin) Recupera i dettagli di un utente specifico
      description: Ritorna l'anagrafica completa di un utente tramite ID. Accesso riservato agli amministratori.
      responses:
        '200':
          description: Dati utente recuperati
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{userId}/addresses:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags:
        - Spedizioni e Contatti
      summary: (Admin/Self) Lista indirizzi di spedizione
      responses:
        '200':
          description: Elenco indirizzi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{userId}/phones:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags:
        - Spedizioni e Contatti
      summary: (Admin/Self) Lista numeri di telefono associati
      responses:
        '200':
          description: Elenco contatti telefonici
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "+39 333 1234567"
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Richiesta non valida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token mancante o scaduto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Permessi amministratore richiesti
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Risorsa non trovata
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Errore imprevisto lato server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        code: { type: string, example: "GENERIC_ERROR" }
        message: { type: string, example: "Si è verificato un errore." }

    User:
      type: object
      required: [id, first_name, last_name, email]
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string, example: "Mario" }
        last_name: { type: string, example: "Rossi" }
        email: { type: string, format: email, example: "mario.rossi@example.com" }
    UserUpdate:
      type: object
      description: Schema per l'aggiornamento parziale dell'utente. Tutti i campi sono opzionali.
      properties:
        first_name: 
          type: string
          minLength: 2
        last_name: 
          type: string
          minLength: 2
        email: 
          type: string
          format: email
          minLength: 5
    UserCreate:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name: { type: string, minLength: 2 }
        last_name: { type: string, minLength: 2 }
        email: { type: string, format: email }

    UserList:
      type: object
      properties:
        total: { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/User'

    Address:
      type: object
      required: [street, city, zip_code]
      properties:
        full_name: { type: string, example: "Mario Rossi" }
        street: { type: string, example: "Via Roma 10" }
        city: { type: string, example: "Milano" }
        zip_code: { type: string, example: "20100" }
        province: { type: string, example: "MI" }

  securitySchemes:
    Auth:
      type: http
      scheme: bearer
      bearerFormat: JWT