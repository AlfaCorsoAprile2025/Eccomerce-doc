openapi: 3.0.3
info:
  title: E-commerce Catalog & Cart API
  description: API per la gestione del catalogo prodotti e del carrello utente.
  version: 1.0.0
tags:
  - name: Catalogo Prodotti
    description: Operazioni per la ricerca, creazione e gestione del catalogo.
  - name: Gestione Carrello
    description: Operazioni per il carrello utente e la gestione degli articoli.
servers:
  - url: https://localhost:8081/catalog/
security:
  - Auth: []
paths:
  # --- CATALOGO PRODOTTI ---
  /products:
    get:
      tags:
        - Catalogo Prodotti
      summary: Lista prodotti con filtri e ricerca
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista di prodotti recuperata con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList' 
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Catalogo Prodotti
      summary: (Admin) Aggiungi un nuovo prodotto
      operationId: addProduct
      requestBody:
        description: Oggetto prodotto da aggiungere al catalogo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Prodotto creato con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Non autorizzato (Permessi insufficienti)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /products/search:
      post:
        tags:
          - Catalogo Prodotti
        summary: Ricerca avanzata prodotti 
        description: Permette ricerche complesse utilizzando un body JSON.
        requestBody:
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: object
                    properties:
                      categories: 
                        type: array
                        items:
                          type: string
                      price_range: 
                        type: object
                        properties:
                          min: 
                            type: number
                          max: 
                            type: number
                  sort_by: 
                    type: string
                    example: "price_asc"
                  limit: 
                    type: integer
                    default: 20
                  offset: 
                    type: integer
                    default: 0
        responses:
          '200':
            description: Risultati della ricerca
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ProductList'
  /products/{productId}:
    put:
      tags:
        - Catalogo Prodotti
      summary: (Admin) Modifica completa prodotto
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Prodotto aggiornato
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    
    patch:
      tags:
        - Catalogo Prodotti
      summary: (Admin) Aggiorna quantità (Stock)
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                stock_quantity:
                  type: integer
      responses:
        '200':
          description: Stock aggiornato
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Catalogo Prodotti
      summary: (Admin) Rimuovi prodotto dal catalogo
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Prodotto rimosso
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /products/filter:
      post:
        tags:
          - Catalogo Prodotti
        summary: Ricerca per corrispondenza esatta (Field Match)
        description: >
          Restituisce i prodotti che corrispondono esattamente ai campi forniti nel body.
          Se un campo è omesso, non verrà usato come criterio di ricerca.
        requestBody:
          description: Esempio di oggetto prodotto con i campi da filtrare
          content:
            application/json:
              schema:
                type: object
                properties:
                  match_criteria:
                    type: object
                    description: Inserisci qui solo i campi che vuoi matchare
                    properties:
                      name: { type: string, example: "iPhone 15" }
                      category: { type: string, example: "Elettronica" }
                      stock_quantity: { type: integer, example: 10 }
                      description: {type: string}
                      imageUrl: {type : string}
                  pagination:
                    type: object
                    properties:
                      limit: { type: integer, default: 20 }
                      offset: { type: integer, default: 0 }
        responses:
          '200':
            description: Prodotti trovati
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ProductList'
          '400':
            $ref: '#/components/responses/BadRequest'

  # --- GESTIONE CARRELLO ---
  /cart:
    get:
      tags:
        - Gestione Carrello
      summary: Recupera il carrello dell'utente corrente
      responses:
        '200':
          description: Dettaglio carrello e subtotale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Gestione Carrello
      summary: Aggiungi un prodotto al carrello
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
      responses:
        '200':
          description: Prodotto aggiunto/aggiornato
        '409':
          description: Quantità non disponibile (Eccezione E1) o Dati non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Prodotto non trovato nel catalogo
        '500':
          $ref: '#/components/responses/InternalError'

  /cart/items/{productId}:
    patch:
      tags:
        - Gestione Carrello
      summary: Modifica quantità di un prodotto nel carrello
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
      responses:
        '200':
          description: Quantità aggiornata
        '404':
          description: Prodotto non presente nel carrello
        '409':
          description: Conflitto - Disponibilità limitata (Eccezione E1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Gestione Carrello
      summary: Rimuovi un prodotto dal carrello
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Prodotto rimosso
        '404':
          description: Prodotto non trovato nel carrello
        '500':
          $ref: '#/components/responses/InternalError'
  /categories:
    get:
      tags:
        - Catalogo Prodotti
      summary: Lista tutte le categorie disponibili
      responses:
        '200':
          description: Elenco categorie recuperato
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    name: { type: string, example: "Informatica" }
                    slug: { type: string, example: "informatica" }
components:
  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: "123e4567-e89b-12d3-a456-426614174000"

  responses:
    BadRequest:
      description: Richiesta malformata
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Autenticazione necessaria
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Risorsa non trovata
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Errore interno del server
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          example: "INTERNAL_SERVER_ERROR"
        message:
          type: string
          example: "Si è verificato un errore imprevisto."

    Product:
          type: object
          required: [id, name, category, price, stock_quantity]
          properties:
            id:
              type: string
              format: uuid
              example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              readOnly: true
            name:
              type: string
              minLength: 1
              example: "Smartphone Samsung Galaxy S23"
            description:
              type: string
              example: "Smartphone di ultima generazione con display AMOLED e fotocamera da 50MP"
            category:
              type: string
              example: "Elettronica"
            price:
              type: number
              format: float
              minimum: 0.01
              example: 799.99
            stock_quantity:
              type: integer
              minimum: 0
              example: 50
            imageUrl:
              type: string
              format: uri
              example: "https://example.com/images/s23.jpg"

    ProductCreate:
          type: object
          required: [name, category, price, stock_quantity]
          properties:
            name:
              type: string
              minLength: 1
              example: "Laptop Lenovo ThinkPad X1"
            description:
              type: string
              example: "Laptop professionale con processore Intel i7 e 16GB di RAM"
            category:
              type: string
              example: "Elettronica"
            price:
              type: number
              format: float
              minimum: 0.01
              example: 1299.99
            stock_quantity:
              type: integer
              minimum: 0
              example: 25
            imageUrl:
              type: string
              format: uri
              example: "https://example.com/images/thinkpad.jpg"

    ProductUpdate:
          type: object
          description: "Tutti i campi sono opzionali per permettere l'aggiornamento parziale (PATCH) o totale (PUT)"
          properties:
            name:
              type: string
              minLength: 1
              example: "Laptop Lenovo ThinkPad X1 Carbon"
            description:
              type: string
              example: "Versione aggiornata con batteria migliorata"
            price:
              type: number
              format: float
              minimum: 0.01
              example: 1399.99
            imageUrl:
              type: string
              format: uri
              example: "https://example.com/images/thinkpad-new.jpg"

    CartItem:
          type: object
          required: [productId, name, price_unit, quantity, total_price]
          properties:
            productId:
              type: string
              format: uuid
            name:
              type: string
              minLength: 1
            price_unit:
              type: number
              minimum: 0
            quantity:
              type: integer
              minimum: 1
              example: 2
            total_price:
              type: number
              minimum: 0

    ProductList:
          type: object
          properties:
            total:
              type: integer
              minimum: 0
            limit:
              type: integer
              minimum: 1
              maximum: 100
            offset:
              type: integer
              minimum: 0
            results:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    Cart:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CartItem'
            subtotal:
              type: number
              minimum: 0
            tax_estimate:
              type: number
              minimum: 0
            total_items:
              type: integer
              minimum: 0
  securitySchemes:
    Auth:            
      type: http
      scheme: bearer
      bearerFormat: JWT